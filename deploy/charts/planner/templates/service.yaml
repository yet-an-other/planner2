apiVersion: v1
kind: Service
metadata:
  name: {{ include "planner.fullname" . }}
  labels:
    {{- include "planner.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "planner.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
