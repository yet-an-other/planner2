name: Web CI

on:
  pull_request:
    paths:
      - web/**
      - product/**
      - CONTEXT-MAP.md
      - .github/workflows/web-*.yml
  push:
    branches: [main]
    paths:
      - web/**
      - product/**
      - CONTEXT-MAP.md
      - .github/workflows/web-*.yml
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - uses: azure/setup-helm@v5
        with:
          version: v3.17.2
      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Test
        working-directory: web
        run: pnpm test
      - name: Typecheck
        working-directory: web
        run: pnpm typecheck
      - name: Validate Helm charts
        working-directory: web
        run: |
          set -euo pipefail
          for environment in proxmox hetzner; do
            helm lint deploy/charts/planner -f "deploy/charts/planner/values-${environment}.yaml"
            helm template planner deploy/charts/planner -f "deploy/charts/planner/values-${environment}.yaml" >/dev/null
            helm lint deploy/charts/planner-bootstrap -f "deploy/charts/planner-bootstrap/values-${environment}.yaml"
            helm template planner deploy/charts/planner-bootstrap -f "deploy/charts/planner-bootstrap/values-${environment}.yaml" >/dev/null
          done
      - name: Validate shell
        working-directory: web
        run: |
          bash -n deploy/bootstrap.sh deploy/test/container-smoke.sh
          sudo apt-get update
          sudo apt-get install --yes shellcheck
          shellcheck deploy/bootstrap.sh deploy/test/container-smoke.sh
      - name: Validate workflows
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.12

  container-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build production image
        run: docker build --tag planner:pr web
      - name: Smoke test read-only image
        run: bash web/deploy/test/container-smoke.sh planner:pr
