name: iOS CI

on:
  push:
    paths:
      - "ios/**"
      - "product/**"
      - "docs/adr/**"
      - "CONTEXT-MAP.md"
      - "README.md"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    paths:
      - "ios/**"
      - "product/**"
      - "docs/adr/**"
      - "CONTEXT-MAP.md"
      - "README.md"
      - ".github/workflows/ios-ci.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Build and test iOS delivery stack
        run: ios/scripts/ci.sh
